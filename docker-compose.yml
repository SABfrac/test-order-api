services:
  app:
    build: .
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: sh -lc "composer install && php -S 0.0.0.0:8000 "
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5673:5672", "15673:15672"]

  worker:
    build: .
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: sh -lc "composer install && php worker.php"
    depends_on:
      - db
      - rabbitmq
    restart: always